<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheShop.com — Everything you love, delivered</title>
  <meta name="description" content="TheShop.com — General merchandise for all ages. Electronics, fashion, home, beauty, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
/* ===========================================
   TheShop - Design System & Global Styles
   =========================================== */

:root {
  /* Brand */
  --color-primary: #0f1a1f;        /* Near-black for buttons & text */
  --color-primary-hover: #1f2a30;
  --color-accent: #1ba7b4;         /* Teal accent */
  --color-accent-hover: #168a95;
  --color-accent-light: #e7f6f8;

  /* Surfaces */
  --color-bg: #ffffff;
  --color-bg-soft: #f1f5f5;        /* Page bg behind cards */
  --color-bg-mute: #f7f9f9;
  --color-card: #ffffff;
  --color-border: #e3e7e8;
  --color-border-light: #eef1f2;

  /* Text */
  --color-text: #0f1a1f;
  --color-text-muted: #5c6770;
  --color-text-light: #8b939a;
  --color-link: #1ba7b4;
  --color-danger: #d72027;
  --color-success: #1ba76b;
  --color-warn: #e08a00;

  /* Type scale */
  --font-display: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  /* Spacing */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-7: 32px;
  --space-8: 40px;
  --space-9: 48px;
  --space-10: 64px;

  /* Radius */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --r-2xl: 28px;
  --r-pill: 999px;

  /* Shadow */
  --shadow-sm: 0 1px 2px rgba(15, 26, 31, 0.04);
  --shadow-md: 0 4px 14px rgba(15, 26, 31, 0.06);
  --shadow-lg: 0 14px 40px rgba(15, 26, 31, 0.10);

  /* Layout */
  --header-height: 96px;
  --max-width: 1280px;
}

/* ===========================================
   Base
   =========================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

body {
  font-family: var(--font-body);
  color: var(--color-text);
  background: var(--color-bg-soft);
  line-height: 1.5;
  font-size: 15px;
  overflow-x: hidden;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
a { color: inherit; text-decoration: none; }
input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
img { max-width: 100%; display: block; }

h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }

.container { max-width: var(--max-width); margin: 0 auto; padding: 0 var(--space-5); }

/* ===========================================
   Header
   =========================================== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
}

.header-top {
  display: grid;
  grid-template-columns: auto auto 1fr auto;
  gap: var(--space-5);
  align-items: center;
  padding: var(--space-4) 0;
}

.brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--color-text);
}
.brand .dot { color: var(--color-accent); }
.brand-sub { font-size: 11px; color: var(--color-text-muted); margin-top: -2px; letter-spacing: 0.05em; }

.deliver-to {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: 12px;
  color: var(--color-text-muted);
  line-height: 1.2;
  padding: 0 var(--space-3);
  border-right: 1px solid var(--color-border);
  height: 40px;
  justify-content: center;
}
.deliver-to strong { color: var(--color-text); font-size: 13px; }
.deliver-to svg { color: var(--color-text); margin-bottom: 2px; }

.search-bar {
  position: relative;
  display: flex;
  height: 44px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--r-md);
  overflow: hidden;
  transition: border-color .15s;
  max-width: 700px;
}
.search-bar:focus-within { border-color: var(--color-accent); }
.search-bar .cat-select {
  background: var(--color-bg-soft);
  border: none;
  padding: 0 var(--space-4);
  border-right: 1px solid var(--color-border);
  font-size: 13px;
  color: var(--color-text);
  cursor: pointer;
  min-width: 80px;
}
.search-bar input {
  flex: 1;
  border: none;
  padding: 0 var(--space-4);
  font-size: 14px;
  outline: none;
  background: transparent;
}
.search-bar input::placeholder { color: var(--color-text-light); }
.search-bar button {
  width: 56px;
  background: var(--color-accent);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.search-bar button:hover { background: var(--color-accent-hover); }

.header-actions {
  display: flex;
  align-items: center;
  gap: var(--space-5);
}

.lang-select {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 13px;
  color: var(--color-text);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--r-md);
  transition: background .15s;
}
.lang-select:hover { background: var(--color-bg-soft); }

.icon-btn {
  position: relative;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-md);
  color: var(--color-text);
  transition: background .15s;
}
.icon-btn:hover { background: var(--color-bg-soft); }
.icon-btn .badge {
  position: absolute;
  top: 4px;
  right: 2px;
  background: var(--color-danger);
  color: white;
  font-size: 10px;
  font-weight: 700;
  height: 16px;
  min-width: 16px;
  padding: 0 4px;
  border-radius: var(--r-pill);
  display: flex;
  align-items: center;
  justify-content: center;
}

.user-menu {
  position: relative;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: 4px var(--space-2);
  border-radius: var(--r-md);
  transition: background .15s;
  cursor: pointer;
}
.user-menu:hover { background: var(--color-bg-soft); }
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ffd7a3, #ff9a6b);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: 12px;
}

.auth-btns { display: flex; gap: var(--space-2); }
.btn-ghost {
  padding: 8px 18px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--color-primary);
  color: var(--color-primary);
  font-size: 13px;
  font-weight: 600;
  transition: all .15s;
}
.btn-ghost:hover { background: var(--color-primary); color: white; }
.btn-solid-dark {
  padding: 8px 18px;
  border-radius: var(--r-pill);
  background: var(--color-primary);
  color: white;
  font-size: 13px;
  font-weight: 600;
  transition: all .15s;
}
.btn-solid-dark:hover { background: #000; }

.sub-nav {
  display: flex;
  align-items: center;
  gap: var(--space-7);
  padding: var(--space-3) 0;
  border-top: 1px solid var(--color-border-light);
  font-size: 13px;
  font-weight: 500;
}
.sub-nav a {
  color: var(--color-text-muted);
  position: relative;
  padding: 4px 0;
  transition: color .15s;
}
.sub-nav a:hover, .sub-nav a.active { color: var(--color-text); }
.sub-nav a.active::after {
  content: '';
  position: absolute;
  left: 0; right: 0; bottom: -15px;
  height: 2px;
  background: var(--color-primary);
}

/* ===========================================
   Buttons
   =========================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 14px 24px;
  border-radius: var(--r-pill);
  font-weight: 600;
  font-size: 14px;
  transition: all .2s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--color-primary);
  color: white;
}
.btn-primary:hover { background: #000; transform: translateY(-1px); }
.btn-block { width: 100%; }
.btn-lg { padding: 18px 32px; font-size: 15px; }

/* ===========================================
   Home: Hero
   =========================================== */
.hero {
  position: relative;
  background: linear-gradient(120deg, #2dd4e6 0%, #6fe1ed 50%, #b3ebf1 100%);
  height: 460px;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -100px; right: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,255,255,.3) 0%, transparent 70%);
}
.hero-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--space-6);
  color: var(--color-text);
}
.hero-eyebrow {
  font-size: 32px;
  font-weight: 600;
  font-family: var(--font-display);
  margin-bottom: var(--space-3);
}
.hero-title {
  font-size: 80px;
  font-weight: 800;
  font-family: var(--font-display);
  letter-spacing: -0.03em;
  line-height: 1;
  color: #0a3d44;
  margin-bottom: var(--space-6);
}
.hero-cta {
  background: var(--color-primary);
  color: white;
  padding: 16px 36px;
  border-radius: var(--r-pill);
  font-weight: 600;
  transition: all .2s;
}
.hero-cta:hover { background: #000; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,.2); }

.hero-decor {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 40px 0 40px;
  pointer-events: none;
  z-index: 1;
}
.hero-decor img { object-fit: contain; }

.hero-dots {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 3;
}
.hero-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(0,0,0,.2); }
.hero-dots .dot.active { background: var(--color-primary); width: 24px; border-radius: 4px; }

/* ===========================================
   Categories strip
   =========================================== */
.cat-strip {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: var(--space-4);
  padding: var(--space-7) 0;
  background: white;
}
.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-4);
  border-radius: var(--r-lg);
  transition: all .2s;
  cursor: pointer;
  text-align: center;
}
.cat-item:hover { background: var(--color-bg-soft); transform: translateY(-2px); }
.cat-icon {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--color-accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--color-accent);
}
.cat-name { font-size: 13px; font-weight: 500; }

/* ===========================================
   Category Sections (Generous Spacing)
   =========================================== */
.section { padding: var(--space-9) 0; }
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: end;
  margin-bottom: var(--space-6);
  padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--color-border);
}
.section-title {
  font-size: 32px;
  font-weight: 700;
  font-family: var(--font-display);
  color: var(--color-primary);
  letter-spacing: -0.02em;
}
.section-link { color: var(--color-link); font-size: 14px; font-weight: 600; }

/* ----- New cat-section wrapper ----- */
.cat-section {
  background: white;
  border-radius: var(--r-2xl);
  padding: var(--space-9) var(--space-8);
  margin-top: var(--space-9);
  box-shadow: 0 1px 2px rgba(15, 26, 31, 0.03);
  border: 1px solid var(--color-border-light);
  position: relative;
  overflow: hidden;
}
.cat-section::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--color-accent), #4dd0c8, #6fc8a8);
  opacity: 0.85;
}
.cat-section--featured::before {
  background: linear-gradient(90deg, #f5a623, #f7b84a, #f5a623);
}
.cat-section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: var(--space-5);
  margin-bottom: var(--space-8);
  padding-bottom: var(--space-5);
  border-bottom: 1px solid var(--color-border-light);
  flex-wrap: wrap;
}
.cat-section-titles {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 0;
}
.cat-section-eyebrow {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-accent);
  padding: 4px 10px;
  background: var(--color-accent-light);
  border-radius: var(--r-pill);
  align-self: flex-start;
  margin-bottom: 2px;
}
.cat-section-eyebrow--new {
  color: #1ba76b;
  background: #e6f7ee;
}
.cat-section-title {
  font-size: 32px;
  font-weight: 800;
  font-family: var(--font-display);
  color: var(--color-primary);
  letter-spacing: -0.025em;
  line-height: 1.1;
  margin: 0;
}
.cat-section-subtitle {
  font-size: 15px;
  color: var(--color-text-muted);
  margin: 4px 0 0;
  max-width: 580px;
  line-height: 1.5;
}
.cat-section-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--color-border);
  background: white;
  color: var(--color-text);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.cat-section-link:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(15, 26, 31, 0.06);
}
.cat-section-link span {
  display: inline-flex;
  transform: rotate(-90deg);
  transition: transform .2s;
}
.cat-section-link:hover span { transform: rotate(-90deg) translateX(2px); }

.product-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-5);
}

/* ===========================================
   Product Card (Polished Hover Wraps Whole Card)
   =========================================== */
.product-card {
  background: white;
  border-radius: var(--r-lg);
  border: 1px solid var(--color-border-light);
  overflow: hidden;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  position: relative;
  transition:
    transform 0.4s cubic-bezier(0.16, 1, 0.3, 1),
    box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
    border-color 0.4s;
  outline: none;
  will-change: transform;
}
.product-card:hover,
.product-card:focus-visible {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px -12px rgba(15, 26, 31, 0.18), 0 8px 16px -8px rgba(15, 26, 31, 0.08);
  border-color: var(--color-border);
}

/* Media (image + overlays) */
.pc-media {
  position: relative;
  aspect-ratio: 1;
  background: linear-gradient(135deg, #f5f7f7 0%, #e9efef 100%);
  overflow: hidden;
}
.pc-img {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
.pc-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  display: block;
}
.product-card:hover .pc-img img,
.product-card:focus-visible .pc-img img {
  transform: scale(1.08);
}

/* Discount badge */
.pc-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--color-primary);
  color: white;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  padding: 4px 8px;
  border-radius: 4px;
  z-index: 2;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
}

/* Wishlist button (top-right, inside media) */
.pc-wish {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--color-text-muted);
  z-index: 2;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}
.pc-wish:hover {
  transform: scale(1.1);
  color: var(--color-danger);
}
.pc-wish.active {
  color: var(--color-danger);
  animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* Quick-add (slides up on hover) */
.pc-quick-add {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 10px;
  display: flex;
  justify-content: center;
  transform: translateY(100%);
  opacity: 0;
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s;
  z-index: 3;
  pointer-events: none;
}
.product-card:hover .pc-quick-add,
.product-card:focus-visible .pc-quick-add {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}
.pc-quick-add-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 16px;
  background: var(--color-primary);
  color: white;
  font-size: 12px;
  font-weight: 600;
  border-radius: var(--r-pill);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
  transition: background 0.15s, transform 0.15s;
  width: 100%;
  justify-content: center;
}
.pc-quick-add-btn:hover {
  background: #000;
  transform: translateY(-1px);
}
.pc-quick-add-btn svg { width: 14px; height: 14px; }

/* Body */
.pc-body {
  padding: 14px 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.pc-meta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  font-size: 11px;
  color: var(--color-text-muted);
}
.pc-rating {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  color: var(--color-text-muted);
  font-weight: 500;
}
.pc-rating strong { color: var(--color-text); font-weight: 700; }
.pc-rating-count { color: var(--color-text-light); }
.pc-star { color: #ffb800; display: inline-flex; }
.pc-star svg { width: 12px; height: 12px; }
.pc-sold { color: var(--color-text-light); font-size: 11px; }

.pc-title {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--color-text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 38px;
  margin: 0;
  transition: color 0.2s;
}
.product-card:hover .pc-title { color: var(--color-accent-hover); }

.pc-pricing {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 2px;
}
.pc-price {
  font-size: 19px;
  font-weight: 800;
  color: var(--color-primary);
  font-family: var(--font-display);
  letter-spacing: -0.01em;
}
.pc-original {
  font-size: 13px;
  color: var(--color-text-light);
  text-decoration: line-through;
}

.pc-action {
  margin-top: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 12px;
  background: var(--color-bg-soft);
  border: 1.5px solid transparent;
  border-radius: var(--r-pill);
  font-size: 12.5px;
  font-weight: 600;
  color: var(--color-text);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  width: 100%;
  text-align: center;
}
.pc-action svg {
  width: 12px;
  height: 12px;
  opacity: 0;
  transform: translateX(-4px);
  transition: all 0.25s;
}
.pc-action:hover, .pc-action:focus-visible {
  background: var(--color-primary);
  color: white;
  transform: translateY(-1px);
  border-color: var(--color-primary);
}
.pc-action:hover svg, .pc-action:focus-visible svg {
  opacity: 1;
  transform: translateX(0);
}

/* ===========================================
   Product Listing Page
   =========================================== */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--color-text-muted);
  padding: var(--space-4) 0;
}
.breadcrumb a:hover { color: var(--color-primary); }
.breadcrumb .sep { color: var(--color-text-light); }

.listing-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: var(--space-6);
  padding-bottom: var(--space-9);
}

.filters {
  background: white;
  border-radius: var(--r-lg);
  padding: var(--space-5);
  height: fit-content;
  position: sticky;
  top: calc(var(--header-height) + 12px);
}
.filter-group { padding: var(--space-4) 0; border-bottom: 1px solid var(--color-border-light); }
.filter-group:last-child { border-bottom: none; }
.filter-title { font-size: 14px; font-weight: 700; margin-bottom: var(--space-3); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: var(--color-bg-soft);
  border-radius: var(--r-sm);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.chip:hover { background: var(--color-border); }
.chip-x { color: var(--color-text-muted); font-size: 14px; line-height: 1; }

.filter-link {
  display: block;
  padding: 6px 8px;
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--color-text);
  margin-bottom: 4px;
  cursor: pointer;
  transition: background .15s;
}
.filter-link:hover { background: var(--color-bg-soft); }
.filter-link.active { background: var(--color-primary); color: white; }
.filter-link.muted { color: var(--color-text-muted); }

.checkbox-row {
  display: flex;
  align-items: flex-start;
  gap: var(--space-2);
  padding: 6px 0;
  font-size: 13px;
  cursor: pointer;
}
.checkbox-row input { margin-top: 2px; accent-color: var(--color-primary); }

.range-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-muted); margin-top: var(--space-2); }
input[type=range] { width: 100%; accent-color: var(--color-primary); }

.listing-main { display: flex; flex-direction: column; gap: var(--space-5); }
.listing-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sort-tabs { display: flex; gap: var(--space-2); }
.sort-tab {
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--color-border);
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
  color: var(--color-text);
  background: white;
}
.sort-tab.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
.sort-tab:hover:not(.active) { background: var(--color-bg-soft); }

/* ===========================================
   Product Detail
   =========================================== */
.pdp-layout { display: grid; grid-template-columns: 1.4fr 1fr; gap: var(--space-7); padding: var(--space-5) 0 var(--space-9); }
.gallery { position: sticky; top: calc(var(--header-height) + 12px); height: fit-content; }
.gallery-main {
  aspect-ratio: 1;
  background: var(--color-bg-soft);
  border-radius: var(--r-lg);
  overflow: hidden;
  position: relative;
}
.gallery-main img { width: 100%; height: 100%; object-fit: cover; }
.gallery-wish {
  position: absolute;
  top: 16px; left: 16px;
  width: 40px; height: 40px;
  background: rgba(255,255,255,.85);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  transition: all .2s;
}
.gallery-wish.active { color: var(--color-danger); background: white; }
.gallery-share {
  position: absolute;
  top: 16px; right: 16px;
  width: 40px; height: 40px;
  background: rgba(255,255,255,.85);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
.gallery-thumbs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: var(--space-2);
  margin-top: var(--space-3);
}
.thumb {
  aspect-ratio: 1;
  border-radius: var(--r-md);
  background: var(--color-bg-soft);
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb.active { border-color: var(--color-primary); }

.pdp-info h1 { font-size: 24px; line-height: 1.3; margin-bottom: var(--space-3); font-weight: 500; }
.pdp-rating { display: flex; align-items: center; gap: var(--space-2); font-size: 13px; color: var(--color-text-muted); margin-bottom: var(--space-4); }
.stars { color: #ffb800; display: inline-flex; gap: 1px; letter-spacing: -2px; }
.pdp-price { font-size: 40px; font-weight: 700; color: var(--color-primary); margin-bottom: var(--space-4); }
.pdp-perks { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-5); }
.perk { display: flex; gap: var(--space-3); font-size: 14px; }
.perk-icon { color: var(--color-accent); flex-shrink: 0; margin-top: 2px; }
.perk strong { color: var(--color-accent); display: block; font-size: 14px; }
.perk small { color: var(--color-text-muted); font-size: 13px; }

.option-group { margin-bottom: var(--space-5); }
.option-label { font-size: 14px; font-weight: 600; margin-bottom: var(--space-3); }
.option-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.option-pill {
  padding: 8px 16px;
  border: 1.5px solid var(--color-border);
  border-radius: var(--r-pill);
  font-size: 13px;
  transition: all .15s;
  cursor: pointer;
}
.option-pill:hover { border-color: var(--color-primary); }
.option-pill.active { border-color: var(--color-primary); background: var(--color-primary); color: white; }

.pdp-cta {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}
.pdp-cta .btn { flex: 1; }

.pdp-meta-card {
  background: white;
  border: 1px solid var(--color-border);
  border-radius: var(--r-lg);
  padding: var(--space-5);
  margin-top: var(--space-5);
}
.meta-row { display: grid; grid-template-columns: 200px 1fr; padding: var(--space-3) 0; border-bottom: 1px solid var(--color-border-light); font-size: 14px; }
.meta-row:last-child { border-bottom: none; }
.meta-row dt { color: var(--color-text-muted); font-weight: 600; }
.meta-row dd { color: var(--color-text); }

/* Reviews */
.reviews-section { padding: var(--space-9) 0; }
.reviews-head { display: flex; justify-content: space-between; align-items: end; margin-bottom: var(--space-6); }
.rating-summary { display: flex; align-items: center; gap: var(--space-5); }
.big-rating { font-size: 56px; font-weight: 700; line-height: 1; }
.rating-bars { display: flex; flex-direction: column; gap: 4px; }
.rating-bar { display: flex; align-items: center; gap: var(--space-2); font-size: 12px; color: var(--color-text-muted); }
.rating-bar .bar { width: 120px; height: 6px; background: var(--color-border); border-radius: 3px; overflow: hidden; }
.rating-bar .bar > div { height: 100%; background: #ffb800; }
.review-card {
  background: white;
  border-radius: var(--r-lg);
  padding: var(--space-5);
  margin-bottom: var(--space-3);
}
.review-head { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-2); }
.review-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--color-bg-soft); display: flex; align-items: center; justify-content: center; font-weight: 600; }
.review-author { font-weight: 600; font-size: 14px; }
.review-date { font-size: 12px; color: var(--color-text-muted); }
.review-title { font-weight: 600; margin: var(--space-3) 0 8px; }
.review-text { color: var(--color-text-muted); font-size: 14px; line-height: 1.6; }
.review-helpful { display: flex; gap: var(--space-2); margin-top: var(--space-3); font-size: 12px; color: var(--color-text-muted); }

/* ===========================================
   Cart page
   =========================================== */
.cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: var(--space-6); padding: var(--space-6) 0 var(--space-9); }
.cart-items {
  background: white;
  border-radius: var(--r-lg);
  padding: var(--space-6);
}
.cart-h1 { font-size: 32px; font-weight: 700; margin-bottom: var(--space-5); padding-bottom: var(--space-4); border-bottom: 1px solid var(--color-border); }
.cart-row {
  display: grid;
  grid-template-columns: 120px 1fr auto;
  gap: var(--space-4);
  padding: var(--space-5) 0;
  border-bottom: 1px solid var(--color-border-light);
}
.cart-row:last-child { border-bottom: none; }
.cart-img {
  width: 120px; height: 120px;
  background: var(--color-bg-soft);
  border-radius: var(--r-md);
  overflow: hidden;
}
.cart-img img { width: 100%; height: 100%; object-fit: cover; }
.cart-info { display: flex; flex-direction: column; justify-content: space-between; }
.cart-title { font-size: 14px; line-height: 1.4; font-weight: 400; color: var(--color-text); }
.cart-seller { font-size: 12px; color: var(--color-text-muted); margin: 4px 0 8px; }
.cart-price { font-size: 24px; font-weight: 700; }
.cart-stock { font-size: 12px; color: var(--color-success); font-weight: 500; margin-top: 4px; }
.cart-actions { display: flex; gap: var(--space-3); align-items: center; margin-top: var(--space-3); font-size: 13px; }
.cart-actions button { color: var(--color-link); font-weight: 600; font-size: 13px; }
.cart-actions span { color: var(--color-border); }
.cart-qty { display: flex; align-items: center; gap: var(--space-2); }
.qty-btn { width: 28px; height: 28px; border-radius: var(--r-sm); border: 1px solid var(--color-border); display: flex; align-items: center; justify-content: center; }
.qty-btn:hover { border-color: var(--color-primary); }
.qty-btn.add { background: var(--color-accent); color: white; border-color: var(--color-accent); }
.qty-input { width: 32px; text-align: center; border: none; font-size: 14px; font-weight: 600; }

.cart-summary {
  background: white;
  border-radius: var(--r-lg);
  padding: var(--space-5);
  height: fit-content;
  position: sticky;
  top: calc(var(--header-height) + 12px);
}
.summary-title { font-size: 16px; font-weight: 700; margin-bottom: var(--space-4); }
.summary-row { display: flex; justify-content: space-between; padding: var(--space-2) 0; font-size: 14px; }
.summary-row.discount { color: var(--color-danger); }
.summary-row.total { border-top: 1px solid var(--color-border); margin-top: var(--space-3); padding-top: var(--space-3); font-size: 18px; font-weight: 700; }
.summary-promo {
  display: flex;
  gap: 8px;
  margin: var(--space-3) 0 var(--space-4);
}
.summary-promo input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--color-border);
  border-radius: var(--r-md);
  font-size: 13px;
  outline: none;
}
.summary-promo input:focus { border-color: var(--color-accent); }
.summary-promo button {
  padding: 10px 18px;
  background: var(--color-accent);
  color: white;
  border-radius: var(--r-md);
  font-size: 13px;
  font-weight: 600;
}
.summary-promo button.applied { background: var(--color-success); }

.trust { padding: var(--space-4) 0; border-top: 1px solid var(--color-border-light); margin-top: var(--space-4); }
.trust-title { font-size: 14px; font-weight: 700; margin-bottom: var(--space-3); }
.trust-row { display: flex; align-items: center; gap: var(--space-2); padding: 6px 0; font-size: 13px; color: var(--color-text-muted); }
.trust-row svg { color: var(--color-accent); }

.cart-empty {
  text-align: center;
  padding: var(--space-9) var(--space-5);
  background: white;
  border-radius: var(--r-lg);
}
.cart-empty h2 { font-size: 22px; margin: var(--space-4) 0 var(--space-3); }
.cart-empty p { color: var(--color-text-muted); margin-bottom: var(--space-5); }
.cart-empty .cta {
  display: inline-block;
  padding: 10px 22px;
  background: var(--color-accent-light);
  color: var(--color-accent);
  border-radius: var(--r-md);
  font-weight: 600;
  font-size: 14px;
  border: 1px solid #c5e8ec;
  cursor: pointer;
}
.cart-empty svg.illus { color: var(--color-text-muted); margin: var(--space-5) auto 0; opacity: .6; }

/* Subtotal under items */
.cart-subtotal { display: flex; justify-content: flex-end; padding: var(--space-5) 0 0; font-size: 18px; font-weight: 700; gap: var(--space-2); }

/* ===========================================
   Checkout
   =========================================== */
.checkout-bg { background: var(--color-bg-soft); padding-bottom: var(--space-9); }
.steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-4);
  padding: var(--space-6) 0 var(--space-5);
}
.step {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-muted);
}
.step .num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-muted);
}
.step.active { color: var(--color-text); }
.step.active .num { background: var(--color-text); color: white; }
.step.done .num { background: var(--color-success); color: white; }
.steps .bar { width: 48px; height: 1px; background: var(--color-border); }

.checkout-layout { display: grid; grid-template-columns: 1fr 380px; gap: var(--space-6); }
.checkout-card {
  background: white;
  border-radius: var(--r-lg);
  padding: var(--space-6);
}
.checkout-h { font-size: 28px; font-weight: 700; margin-bottom: var(--space-5); }
.back-link {
  font-size: 14px;
  color: var(--color-text);
  text-decoration: underline;
  font-weight: 500;
  margin-left: auto;
  display: block;
  text-align: right;
  margin-top: -36px;
}
.checkout-section { padding: var(--space-4) 0; border-bottom: 1px solid var(--color-border-light); }
.checkout-section:last-of-type { border-bottom: none; }
.cs-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-3); }
.cs-title { font-size: 16px; font-weight: 700; }
.cs-edit { font-size: 13px; color: var(--color-text); text-decoration: underline; font-weight: 500; }
.cs-sub { font-size: 12px; color: var(--color-text-muted); margin-bottom: var(--space-3); }
.field {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--color-border);
  border-radius: var(--r-md);
  font-size: 14px;
  background: white;
  outline: none;
  transition: border-color .15s;
  appearance: none;
}
.field:focus { border-color: var(--color-accent); }
.field::placeholder { color: var(--color-text-light); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-3); }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.field-row.has-icon { position: relative; }
.field-row.has-icon::after {
  content: '';
  position: absolute;
  right: 14px; top: 50%;
  width: 0; height: 0;
  transform: translateY(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 6px solid var(--color-text-muted);
  pointer-events: none;
}
.field-row.has-icon select { padding-right: 36px; }
.checkbox-line { display: flex; align-items: center; gap: 8px; margin: var(--space-3) 0; font-size: 14px; }
.checkbox-line input { accent-color: var(--color-accent); }
.delivery-option { display: flex; align-items: center; gap: var(--space-2); padding: 6px 0; font-size: 14px; }
.delivery-option .badge-free { color: var(--color-text-muted); font-size: 12px; margin-left: 6px; }

/* Floating label fields */
.floating-field {
  position: relative;
  margin-bottom: var(--space-3);
}
.floating-field .field {
  height: 56px;
  padding: 20px 16px 8px;
  background: white;
}
.floating-field select.field {
  color: var(--color-text);
  padding-top: 22px;
}
.floating-field select.field:invalid { color: transparent; }
.floating-field .float-label {
  position: absolute;
  left: 16px; top: 18px;
  font-size: 14px;
  color: var(--color-text-light);
  pointer-events: none;
  transition: all .15s ease;
  background: transparent;
}
.floating-field .field:focus + .float-label,
.floating-field .field:not(:placeholder-shown) + .float-label,
.floating-field .field:valid + .float-label {
  top: 8px;
  font-size: 11px;
  color: var(--color-text-muted);
  font-weight: 500;
}
.floating-field select.field + .float-label {
  top: 8px;
  font-size: 11px;
  color: var(--color-text-muted);
  font-weight: 500;
}
.floating-field::after {
  content: '';
  position: absolute;
  right: 14px; top: 50%;
  width: 0; height: 0;
  transform: translateY(-50%);
  border-left: 5px solid transparent;
  border-right: 5px solid transparent;
  border-top: 6px solid var(--color-text-muted);
  pointer-events: none;
}
.floating-field select.field { padding-right: 36px; }

.summary-sticky { position: sticky; top: calc(var(--header-height) + 12px); }

/* OTP */
.otp-card { max-width: 480px; margin: 0 auto; padding: var(--space-7); }
.otp-title { font-size: 22px; font-weight: 700; margin-bottom: var(--space-3); }
.otp-text { color: var(--color-text); font-size: 15px; line-height: 1.5; margin-bottom: var(--space-7); }
.otp-inputs { display: flex; gap: var(--space-3); justify-content: center; margin-bottom: var(--space-7); }
.otp-in {
  width: 50px; height: 60px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
  border: 2px solid var(--color-border);
  border-radius: var(--r-md);
  background: white;
  outline: none;
  transition: all .15s;
}
.otp-in:focus { border-color: var(--color-accent); }
.otp-in.filled { border-color: var(--color-text); }

/* ===========================================
   Sign in / Register modal
   =========================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(15, 26, 31, 0.5);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--space-5);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  background: white;
  border-radius: var(--r-2xl);
  padding: var(--space-7);
  max-width: 420px;
  width: 100%;
  position: relative;
  transform: scale(.95);
  transition: transform .25s;
}
.modal-overlay.active .modal { transform: scale(1); }
.modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); }
.modal-close:hover { background: var(--color-bg-soft); }
.modal h2 { font-size: 22px; font-weight: 700; margin-bottom: var(--space-5); }
.modal .field-row { margin-bottom: var(--space-3); }
.modal .field { padding: 14px 16px; }
.modal .btn { padding: 14px; }
.modal-divider { text-align: center; font-size: 13px; color: var(--color-text-muted); margin: var(--space-4) 0; position: relative; }
.modal-divider::before, .modal-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: calc(50% - 20px);
  height: 1px;
  background: var(--color-border);
}
.modal-divider::before { left: 0; }
.modal-divider::after { right: 0; }
.modal-foot { text-align: center; font-size: 13px; color: var(--color-text-muted); margin-top: var(--space-4); }
.modal-foot a { color: var(--color-link); font-weight: 600; text-decoration: underline; }
.modal-bg-img {
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(135deg, #f0f8f9, #e0eef0);
  background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=900&q=80');
  background-size: cover;
  background-position: center;
  opacity: 0.5;
  border-radius: var(--r-2xl);
}
.modal-bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 199;
  background-image: url('https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=1920&q=80');
  background-size: cover;
  background-position: center;
  filter: blur(0px);
}
.modal-page-wrap { position: relative; min-height: 100vh; }
.modal-on-bg .modal { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.5); }

.terms { font-size: 12px; color: var(--color-text-muted); margin-top: var(--space-4); line-height: 1.5; }
.terms a { color: var(--color-link); }

.social-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); }
.social-btn {
  padding: 12px;
  border: 1px solid var(--color-border);
  border-radius: var(--r-md);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 500;
  transition: all .15s;
}
.social-btn:hover { background: var(--color-bg-soft); }

/* ===========================================
   Account page
   =========================================== */
.account-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 600px;
  border-radius: var(--r-lg);
  overflow: hidden;
  margin: var(--space-5) 0 var(--space-9);
  box-shadow: var(--shadow-sm);
}
.account-nav {
  background: white;
  padding: var(--space-5) 0;
}
.account-nav-item {
  display: block;
  padding: 14px var(--space-6);
  font-size: 14px;
  color: var(--color-text);
  transition: all .15s;
  cursor: pointer;
  border-left: 3px solid transparent;
}
.account-nav-item:hover { background: var(--color-bg-soft); }
.account-nav-item.active { font-weight: 700; border-left-color: var(--color-text); }
.account-content { background: #c5ccd0; padding: var(--space-7); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

/* ===========================================
   Toasts
   =========================================== */
.toast-host { position: fixed; bottom: 24px; right: 24px; z-index: 300; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--color-primary);
  color: white;
  padding: 12px 18px;
  border-radius: var(--r-md);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn .3s ease;
  display: flex; align-items: center; gap: 8px;
}
.toast.success { background: var(--color-success); }

@keyframes toastIn {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

/* ===========================================
   Footer
   =========================================== */
.site-footer { background: white; border-top: 1px solid var(--color-border); padding: var(--space-9) 0 var(--space-6); margin-top: var(--space-9); }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: var(--space-6); margin-bottom: var(--space-7); }
.footer-col h4 { font-size: 14px; font-weight: 700; margin-bottom: var(--space-3); }
.footer-col a { display: block; font-size: 13px; color: var(--color-text-muted); padding: 4px 0; }
.footer-col a:hover { color: var(--color-text); }
.footer-col p { font-size: 13px; color: var(--color-text-muted); line-height: 1.6; margin-top: var(--space-3); }
.footer-bot { display: flex; justify-content: space-between; padding-top: var(--space-5); border-top: 1px solid var(--color-border); font-size: 12px; color: var(--color-text-muted); }

/* ===========================================
   Trending / Category Hero
   =========================================== */
.cat-hero {
  position: relative;
  height: 280px;
  background: linear-gradient(120deg, #4a5d6e 0%, #6b8497 50%, #92a8b8 100%);
  display: flex;
  align-items: center;
  padding: var(--space-5) var(--space-7);
  overflow: hidden;
}
.cat-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 50%, rgba(0,0,0,.3));
}
.cat-hero img { position: absolute; right: 0; top: 0; height: 100%; object-fit: cover; opacity: 0.85; }
.cat-hero-content { position: relative; z-index: 2; color: white; max-width: 700px; }
.cat-hero-content .breadcrumb { color: rgba(255,255,255,.85); padding: 0 0 var(--space-3) 0; }
.cat-hero-content .breadcrumb a { color: white; }
.cat-hero-content .breadcrumb span { color: rgba(255,255,255,.7); }
.cat-hero h1 { font-size: 48px; margin-bottom: var(--space-2); color: white; }
.cat-hero p { font-size: 17px; opacity: .92; }

/* ===========================================
   Responsive
   =========================================== */
@media (max-width: 1024px) {
  .product-grid { grid-template-columns: repeat(3, 1fr); }
  .pdp-layout { grid-template-columns: 1fr; }
  .gallery { position: static; }
  .listing-layout { grid-template-columns: 1fr; }
  .filters { position: static; }
  .cart-layout { grid-template-columns: 1fr; }
  .checkout-layout { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .header-top { grid-template-columns: 1fr auto; gap: var(--space-3); }
  .header-top .deliver-to, .header-top .search-bar { display: none; }
  .cat-strip { grid-template-columns: repeat(4, 1fr); }
  .hero-title { font-size: 48px; }
  .cat-section { padding: var(--space-7) var(--space-6); margin-top: var(--space-7); }
  .cat-section-title { font-size: 28px; }
  .cat-section-head { gap: var(--space-4); }
}
@media (max-width: 640px) {
  .product-grid { grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
  .hero { height: 360px; }
  .hero-title { font-size: 32px; }
  .hero-eyebrow { font-size: 22px; }
  .cat-strip { grid-template-columns: repeat(3, 1fr); }
  .pdp-info h1 { font-size: 20px; }
  .pdp-price { font-size: 28px; }
  .gallery-thumbs { grid-template-columns: repeat(5, 1fr); }
  .auth-btns .btn-ghost { display: none; }
  .sub-nav { overflow-x: auto; white-space: nowrap; }
  .account-layout { grid-template-columns: 1fr; }
  .cart-row { grid-template-columns: 80px 1fr; }
  .cart-img { width: 80px; height: 80px; }
  .checkout-layout, .cart-layout, .pdp-layout, .listing-layout { grid-template-columns: 1fr; }
  .pdp-cta { flex-direction: column; }
  .field-row.three { grid-template-columns: 1fr 1fr; }
  .footer-grid { grid-template-columns: 1fr; }
  .otp-in { width: 38px; height: 50px; font-size: 20px; }
  .cat-section { padding: var(--space-6) var(--space-4); margin-top: var(--space-6); border-radius: var(--r-xl); }
  .cat-section-title { font-size: 24px; }
  .cat-section-head { margin-bottom: var(--space-5); padding-bottom: var(--space-4); }
  .cat-section-link { padding: 8px 14px; font-size: 12px; }
  .pc-body { padding: 12px; }
  .pc-title { font-size: 13px; min-height: 36px; }
  .pc-price { font-size: 17px; }
}

/* ===========================================
   Animations
   =========================================== */
.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.shake { animation: shake .4s ease; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.pulse { animation: pulse .3s ease; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

/* ===========================================
   TheShop - Animations & Motion
   Framer-Motion-inspired smooth animations
   =========================================== */

/* Smooth scrolling for the entire page */
html { scroll-behavior: smooth; }
body { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

/* Honor reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ----- Reveal-on-scroll animations ----- */
.reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); animation: revealFallback 0s 1.2s forwards; }
.reveal.visible { opacity: 1; transform: translateY(0); animation: none; }
.reveal-left { opacity: 0; transform: translateX(-30px); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); animation: revealFallback 0s 1.2s forwards; }
.reveal-left.visible { opacity: 1; transform: translateX(0); animation: none; }
.reveal-right { opacity: 0; transform: translateX(30px); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); animation: revealFallback 0s 1.2s forwards; }
.reveal-right.visible { opacity: 1; transform: translateX(0); animation: none; }
.reveal-scale { opacity: 0; transform: scale(0.92); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); animation: revealFallback 0s 1.2s forwards; }
.reveal-scale.visible { opacity: 1; transform: scale(1); animation: none; }
@keyframes revealFallback {
  to { opacity: 1; transform: translateY(0) translateX(0) scale(1); }
}

/* Stagger delays for child elements */
.stagger > * { opacity: 0; transform: translateY(20px); transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
/* Fallback: if JS is slow, show items after 1s to avoid them being invisible forever */
.stagger > * { animation: staggerFallback 0s 1.2s forwards; }
@keyframes staggerFallback {
  to { opacity: 1; transform: translateY(0); }
}
.stagger.visible > * { opacity: 1; transform: translateY(0); animation: none; }
.stagger.visible > *:nth-child(1)  { transition-delay: 0.05s; }
.stagger.visible > *:nth-child(2)  { transition-delay: 0.10s; }
.stagger.visible > *:nth-child(3)  { transition-delay: 0.15s; }
.stagger.visible > *:nth-child(4)  { transition-delay: 0.20s; }
.stagger.visible > *:nth-child(5)  { transition-delay: 0.25s; }
.stagger.visible > *:nth-child(6)  { transition-delay: 0.30s; }
.stagger.visible > *:nth-child(7)  { transition-delay: 0.35s; }
.stagger.visible > *:nth-child(8)  { transition-delay: 0.40s; }
.stagger.visible > *:nth-child(9)  { transition-delay: 0.45s; }
.stagger.visible > *:nth-child(10) { transition-delay: 0.50s; }
.stagger.visible > *:nth-child(11) { transition-delay: 0.55s; }
.stagger.visible > *:nth-child(12) { transition-delay: 0.60s; }
.stagger.visible > *:nth-child(13) { transition-delay: 0.65s; }
.stagger.visible > *:nth-child(14) { transition-delay: 0.70s; }
.stagger.visible > *:nth-child(15) { transition-delay: 0.75s; }
.stagger.visible > *:nth-child(n+16) { transition-delay: 0.80s; }

/* ----- Hover micro-interactions ----- */
.product-card {
  will-change: transform;
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.product-card:hover {
  transform: translateY(-6px) scale(1.01);
  box-shadow: 0 20px 40px -10px rgba(15, 26, 31, 0.15), 0 8px 16px -8px rgba(15, 26, 31, 0.08);
}
.product-card .pc-img img {
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.product-card:hover .pc-img img { transform: scale(1.08); }

.pc-wish, .gallery-wish, .gallery-share, .pc-action {
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s, color 0.2s;
}
.pc-wish:hover, .gallery-wish:hover, .gallery-share:hover { transform: scale(1.15); }
.pc-action:hover { transform: translateY(-2px); }

/* ----- Page transitions ----- */
.page-enter { animation: pageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Hero entrance */
.hero-content { animation: heroIn 1s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes heroIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.hero-eyebrow { animation: fadeUp 0.8s 0.1s both cubic-bezier(0.16, 1, 0.3, 1); }
.hero-title    { animation: fadeUp 0.9s 0.2s both cubic-bezier(0.16, 1, 0.3, 1); }
.hero-cta      { animation: fadeUp 0.8s 0.4s both cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Category strip slide-in */
.cat-strip .cat-item {
  opacity: 0;
  transform: translateY(20px);
  animation: catIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes catIn { to { opacity: 1; transform: translateY(0); } }
.cat-strip .cat-item:nth-child(1) { animation-delay: 0.05s; }
.cat-strip .cat-item:nth-child(2) { animation-delay: 0.10s; }
.cat-strip .cat-item:nth-child(3) { animation-delay: 0.15s; }
.cat-strip .cat-item:nth-child(4) { animation-delay: 0.20s; }
.cat-strip .cat-item:nth-child(5) { animation-delay: 0.25s; }
.cat-strip .cat-item:nth-child(6) { animation-delay: 0.30s; }
.cat-strip .cat-item:nth-child(7) { animation-delay: 0.35s; }
.cat-strip .cat-item:nth-child(8) { animation-delay: 0.40s; }

/* Gallery image swap */
.gallery-main img {
  transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.thumb {
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s, opacity 0.2s;
}
.thumb:hover { transform: translateY(-2px); }
.thumb.active { transform: scale(1.05); }

/* Cart row add/remove animation */
.cart-row { animation: rowIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-20px); }
  to   { opacity: 1; transform: translateX(0); }
}
.cart-row.removing { animation: rowOut 0.3s cubic-bezier(0.7, 0, 0.84, 0) forwards; }
@keyframes rowOut {
  to { opacity: 0; transform: translateX(20px) scale(0.95); height: 0; padding: 0; margin: 0; overflow: hidden; }
}

/* Steps indicator */
.step .num { transition: background 0.3s, color 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
.step.active .num { transform: scale(1.1); }

/* Toasts */
.toast {
  animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards, toastOut 0.3s 2.1s cubic-bezier(0.7, 0, 0.84, 0) forwards;
}
@keyframes toastIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(120%); opacity: 0; } }

/* Quantity update bounce */
.qty-input { transition: transform 0.2s; }
.qty-input.bump { animation: bump 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes bump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}

/* Heart fill pop */
.pc-wish.active { animation: heartPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* Cart badge pulse */
.icon-btn .badge { animation: badgePop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes badgePop { 0% { transform: scale(0); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

/* Skeleton shimmer (for loading) */
.shimmer {
  background: linear-gradient(90deg, #f0f3f4 0%, #e7ebec 50%, #f0f3f4 100%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* Modal */
.modal-overlay { transition: opacity 0.3s; }
.modal { transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s; }

/* Field focus */
.field, .otp-in { transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s; }
.field:focus, .otp-in:focus {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px -4px rgba(27, 167, 180, 0.15);
}

/* Review cards */
.review-card { transition: transform 0.3s, box-shadow 0.3s; }
.review-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -8px rgba(15, 26, 31, 0.1); }

/* Quick fade-in for dynamic content */
.fade-in { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Subtle floating on hero decor */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}
.hero-decor img:first-child { animation: float 6s ease-in-out infinite; }
.hero-decor img:last-child  { animation: float 7s ease-in-out infinite reverse; }

/* Hero dots */
.hero-dots .dot { transition: width 0.3s, background 0.3s; }

/* Sort tabs */
.sort-tab { transition: background 0.2s, color 0.2s, transform 0.2s; }
.sort-tab:hover { transform: translateY(-1px); }

/* Option pills */
.option-pill { transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.2s; }
.option-pill:hover { transform: translateY(-1px); }
.option-pill.active { animation: pillPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes pillPop { 50% { transform: scale(1.05); } }

/* Checkbox */
input[type="checkbox"] { transition: transform 0.2s; }
input[type="checkbox"]:checked { animation: checkPop 0.3s; }
@keyframes checkPop { 50% { transform: scale(1.2); } }

/* Buttons */
.btn { transition: transform 0.2s, background 0.2s, box-shadow 0.2s; }
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

/* Loading dots */
@keyframes dotPulse { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
.loading-dots span { display: inline-block; animation: dotPulse 1.4s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

/* ===========================================
   Hero Carousel (Slide Transition)
   =========================================== */
.hero-carousel {
  position: relative;
  overflow: hidden;
  width: 100%;
  background: #0f1a1f;
}
.hero-slides {
  position: relative;
  width: 100%;
  height: 480px;
  overflow: hidden;
}
.hero-slide {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  visibility: hidden;
  pointer-events: none;
  will-change: transform, opacity;
}
.hero-slide.active {
  visibility: visible;
  pointer-events: auto;
  z-index: 2;
  transform: translateX(0);
  transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1);
}
/* Default state: off-screen to the right (for "next" direction) */
.hero-slide.enter-right {
  visibility: visible;
  transform: translateX(100%);
  transition: none;
}
/* During transition: active exits left, new enters from right */
.hero-slide.exit-left {
  visibility: visible;
  transform: translateX(-100%) !important;
  transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1) !important;
  z-index: 1;
}
.hero-slide.entering-from-right {
  visibility: visible;
  transform: translateX(0);
  transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1);
  z-index: 2;
}

/* "Previous" direction: new slide comes from left */
.hero-slide.enter-left {
  visibility: visible;
  transform: translateX(-100%);
  transition: none;
}
.hero-slide.exit-right {
  visibility: visible;
  transform: translateX(100%) !important;
  transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1) !important;
  z-index: 1;
}
.hero-slide.entering-from-left {
  visibility: visible;
  transform: translateX(0);
  transition: transform 0.7s cubic-bezier(0.65, 0, 0.35, 1);
  z-index: 2;
}

/* Default (no state classes): off-screen to the right (waiting) */
.hero-slide:not(.active):not(.enter-right):not(.enter-left):not(.exit-left):not(.exit-right):not(.entering-from-right):not(.entering-from-left) {
  visibility: hidden;
  transform: translateX(100%);
}

/* After exit, hide the slide */
.hero-slide.exit-left,
.hero-slide.exit-right {
  /* keep visible during animation, but reset z-index so future transitions work */
  z-index: 1;
}

/* Smooth floating decor on each slide */
.hero-slide.active .hero-content {
  animation: heroIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.hero-slide.active .hero-decor img:first-child {
  animation: heroDecorLeft 8s ease-in-out infinite;
}
.hero-slide.active .hero-decor img:last-child {
  animation: heroDecorRight 9s ease-in-out infinite;
}
@keyframes heroIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes heroDecorLeft {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-14px) rotate(1.5deg); }
}
@keyframes heroDecorRight {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-18px) rotate(-2deg); }
}

/* Carousel arrows */
.hero-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--color-text);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
  cursor: pointer;
  opacity: 0;
}
.hero-carousel:hover .hero-arrow { opacity: 1; }
.hero-arrow:hover {
  background: white;
  transform: translateY(-50%) scale(1.1);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
}
.hero-arrow:active { transform: translateY(-50%) scale(0.95); }
.hero-prev { left: 24px; }
.hero-next { right: 24px; }
.hero-arrow svg { transition: transform 0.3s; }
.hero-prev:hover svg { transform: translateX(-2px); }
.hero-next:hover svg { transform: translateX(2px); }

/* Carousel dots with progress fill */
.hero-carousel .hero-dots {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
  padding: 0;
  background: none;
  backdrop-filter: none;

// ===========================================
// TheShop - Motion (Framer-Motion inspired)
// Lightweight vanilla JS animation utilities
// ===========================================

const Motion = {
  // Intersection-based reveal: animates an element when it enters viewport
  reveal(selector, options = {}) {
    const els = document.querySelectorAll(selector);
    if (!els.length) return;
    const config = {
      threshold: 0.05,
      rootMargin: '0px 0px -10px 0px',
      once: true,
      ...options
    };
    // First: immediately reveal any element already in the viewport
    const reveal = (el) => el.classList.add('visible');
    const isInView = (el) => {
      const rect = el.getBoundingClientRect();
      return rect.top < window.innerHeight && rect.bottom > 0;
    };
    // Schedule a slight delay so layout finishes
    requestAnimationFrame(() => {
      els.forEach(el => {
        if (isInView(el)) {
          reveal(el);
        }
      });
    });
    // Safety net: if an element has been visible for 800ms but hasn't been
    // marked visible (e.g. IntersectionObserver didn't fire), reveal it anyway.
    // This prevents stuck-invisible elements.
    setTimeout(() => {
      els.forEach(el => {
        if (!el.classList.contains('visible') && isInView(el)) {
          reveal(el);
        }
      });
    }, 800);
    // Then observe the rest for scroll-in
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          if (config.once) obs.unobserve(entry.target);
        } else if (!config.once) {
          entry.target.classList.remove('visible');
        }
      });
    }, config);
    els.forEach(el => {
      if (!el.classList.contains('visible')) obs.observe(el);
    });
    return obs;
  },

  // Animate a number from one value to another
  countTo(el, target, duration = 800) {
    const start = parseFloat(el.textContent) || 0;
    const startTime = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
      const val = start + (target - start) * eased;
      el.textContent = Math.round(val).toLocaleString();
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  },

  // Smooth scroll to element
  scrollTo(target, offset = 0) {
    const el = typeof target === 'string' ? document.querySelector(target) : target;
    if (!el) return;
    const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
    window.scrollTo({ top, behavior: 'smooth' });
  },

  // Scroll progress bar
  initScrollProgress() {
    let bar = document.querySelector('.scroll-progress');
    if (!bar) {
      bar = document.createElement('div');
      bar.className = 'scroll-progress';
      document.body.appendChild(bar);
    }
    const update = () => {
      const h = document.documentElement;
      const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
      bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
    };
    window.addEventListener('scroll', update, { passive: true });
    update();
  },

  // Bump a quantity input value briefly
  bumpElement(el) {
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 300);
  },

  // Smooth-filterable list: fade out, swap, fade in
  swapList(container, newHTML, duration = 250) {
    container.style.transition = `opacity ${duration}ms ease`;
    container.style.opacity = '0';
    setTimeout(() => {
      container.innerHTML = newHTML;
      container.style.opacity = '1';
      // Re-run reveal observer
      Motion.reveal('.reveal, .stagger');
    }, duration);
  },

  // Shake an element
  shake(el) {
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 400);
  },

  // Lightweight spring-like transform animation
  spring(el, fromProps, toProps, options = {}) {
    const config = {
      stiffness: 200,
      damping: 20,
      duration: 500,
      ...options
    };
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / config.duration);
      // Damped spring approximation
      const eased = 1 - Math.pow(1 - t, 3);
      for (const key in toProps) {
        const fromVal = fromProps[key] || 0;
        const toVal = toProps[key];
        el.style[key] = (fromVal + (toVal - fromVal) * eased) + 'px';
      }
      if (t < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }
};

// Hook into page navigation
function setupMotion() {
  // Initial reveals
  Motion.reveal('.reveal, .stagger');
  // Scroll progress
  Motion.initScrollProgress();
  // Smooth scroll for any in-page anchor
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (href.length > 2) {
      // It's an in-page link, not a route
      const target = document.querySelector(href);
      if (target) {
        e.preventDefault();
        Motion.scrollTo(target, 100);
      }
    }
  });
}

// Utility
function money(n) { return '$' + Number(n).toFixed(2); }
function escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
function stars(n) {
  const full = Math.floor(n);
  const half = n - full >= 0.5;
  let out = '';
  for (let i=0;i<full;i++) out += ICONS.star;
  if (half) out += ICONS.star;
  for (let i=full+(half?1:0); i<5; i++) out += ICONS.starOutline;
  return out;
}
function productCard(p) {
  const isWished = State.wishlist.includes(p.id);
  const discount = Math.round((1 - p.price/p.originalPrice) * 100);
  return `
    <article class="product-card" onclick="navigate('product', '${p.id}')" tabindex="0" role="button" aria-label="View ${escape(p.title)}">
      <div class="pc-media">
        <div class="pc-img">
          <img src="${p.images[0]}" alt="${escape(p.title)}" loading="lazy">
          ${discount > 0 ? `<span class="pc-badge">-${discount}%</span>` : ''}
        </div>
        <button class="pc-wish ${isWished?'active':''}" onclick="event.stopPropagation(); toggleWish('${p.id}', this)" aria-label="Add to wishlist">
          ${isWished ? ICONS.heartFilled : ICONS.heart}
        </button>
        <div class="pc-quick-add">
          <button class="pc-quick-add-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">
            ${ICONS.cart}
            <span>Quick add</span>
          </button>
        </div>
      </div>
      <div class="pc-body">
        <div class="pc-meta-row">
          <span class="pc-rating">
            <span class="pc-star">${ICONS.star}</span>
            <strong>${p.rating.toFixed(1)}</strong>
            <span class="pc-rating-count">(${p.reviewCount >= 1000 ? (p.reviewCount/1000).toFixed(1) + 'k' : p.reviewCount})</span>
          </span>
          <span class="pc-sold">${p.sold >= 1000 ? (p.sold/1000).toFixed(0) + 'k+' : p.sold}+ sold</span>
        </div>
        <h3 class="pc-title">${escape(p.title)}</h3>
        <div class="pc-pricing">
          <span class="pc-price">${money(p.price)}</span>
          <span class="pc-original">${money(p.originalPrice)}</span>
        </div>
        <button class="pc-action" onclick="event.stopPropagation(); addToCart('${p.id}')">
          <span>Add to Cart</span>
          ${ICONS.plus}
        </button>
      </div>
    </article>`;
}

// ===========================================
// Cart actions
// ===========================================
function addToCart(id) {
  const product = getProduct(id);
  if (!product) return;
  const existing = State.cart.find(i => i.id === id);
  if (existing) {
    existing.qty++;
  } else {
    State.cart.push({ id: product.id, qty: 1, price: product.price });
  }
  saveState();
  renderHeader();
  showToast(`Added to cart`);
  // Animate cart icon
  const cartIcon = document.querySelector('[data-cart-icon]');
  if (cartIcon) {
    cartIcon.classList.add('pulse');
    setTimeout(() => cartIcon.classList.remove('pulse'), 300);
  }
}

function updateCartQty(id, delta) {
  const item = State.cart.find(i => i.id === id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  if (item.qty === 0) {
    State.cart = State.cart.filter(i => i.id !== id);
  }
  saveState();
  renderCurrent();
  renderHeader();
  // Bump the qty input
  setTimeout(() => {
    const el = document.querySelector(`[data-pid="${id}"] .qty-input`);
    if (el && typeof Motion !== 'undefined') Motion.bumpElement(el);
  }, 50);
}

function removeFromCart(id) {
  State.cart = State.cart.filter(i => i.id !== id);
  saveState();
  renderCurrent();
  renderHeader();
  showToast('Item removed');
}

function toggleWish(id, btn) {
  if (State.wishlist.includes(id)) {
    State.wishlist = State.wishlist.filter(w => w !== id);
    if (btn) btn.classList.remove('active');
  } else {
    State.wishlist.push(id);
    if (btn) btn.classList.add('active');
    showToast('Added to wishlist');
  }
  saveState();
}

function applyPromo() {
  if (State.promoApplied) {
    State.promoApplied = false;
    showToast('Promo removed');
  } else {
    State.promoApplied = true;
    showToast('Promo WELCOME50 applied - 100% off!');
  }
  renderCurrent();
}

// ===========================================
// Router
// ===========================================
function navigate(page, id) {
  State.currentPage = page;
  if (id) {
    if (page === 'product') State.currentProductId = id;
    if (page === 'checkout') State.checkoutStep = parseInt(id) || 1;
    if (page === 'category') State.currentCategory = id;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Always update the URL
  State.route = '#/' + (page === 'home' ? '' : page + (id ? '/' + id : ''));
  if (window.location.hash !== State.route) {
    history.pushState(null, '', State.route);
  }
  renderCurrent();
  // Re-run motion observer for newly added elements
  setTimeout(() => Motion && Motion.reveal('.reveal, .stagger'), 50);
  // Start hero carousel on home page
  if (page === 'home') {
    setTimeout(() => { initHeroCarousel(); }, 200);
  } else {
    stopHeroInterval();
    stopHeroKeyboard();
  }
}

window.addEventListener('popstate', () => {
  parseRoute();
  // After parseRoute sets State.currentPage, renderCurrent won't overwrite
  renderCurrent();
});

function parseRoute() {
  const hash = window.location.hash || '#/';
  const parts = hash.replace('#/', '').split('/');
  if (!parts[0] || parts[0] === '') {
    State.currentPage = 'home';
  } else if (parts[0] === 'product' && parts[1]) {
    State.currentPage = 'product';
    State.currentProductId = parts[1];
  } else if (parts[0] === 'cart') {
    State.currentPage = 'cart';
  } else if (parts[0] === 'checkout') {
    State.currentPage = 'checkout';
    State.checkoutStep = parseInt(parts[1]) || 1;
  } else if (parts[0] === 'category' && parts[1]) {
    State.currentPage = 'category';
    State.currentCategory = parts[1];
  } else if (CATEGORIES.find(c => c.id === parts[0])) {
    // Direct category route
    State.currentPage = 'category';
    State.currentCategory = parts[0];
  } else if (parts[0] === 'account') {
    State.currentPage = 'account';
  } else {
    State.currentPage = 'home';
  }
}

function renderCurrent() {
  // Only parse route from URL on popstate (browser back/forward)
  // Otherwise trust State.currentPage which was set by navigate()
  const app = document.getElementById('app');
  if (!app) return;
  let html = '';
  switch (State.currentPage) {
    case 'home': html = renderHome(); break;
    case 'product': html = renderProduct(); break;
    case 'cart': html = renderCart(); break;
    case 'checkout': html = renderCheckout(); break;
    case 'category': html = renderCategory(); break;
    case 'account': html = renderAccount(); break;
    case 'signin': html = renderSignIn(); break;
    case 'register': html = renderRegister(); break;
    default: html = renderHome();
  }
  app.innerHTML = '<div class="page-enter">' + html + '</div>';
  // Scroll to top smoothly
  window.scrollTo({ top: 0, behavior: 'smooth' });
  // Re-run motion observer
  if (typeof Motion !== 'undefined') {
    Motion.reveal('.reveal, .stagger');
  }
  // Set focus for inputs
  setTimeout(() => {
    const f = app.querySelector('[autofocus]');
    if (f) f.focus();
  }, 50);
}
